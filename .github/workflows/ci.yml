name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check src tests scripts dashboard

      - name: Format check (black)
        run: black --check src tests scripts dashboard

      - name: Run tests
        env:
          # Keep CI hermetic: weather client falls back instead of hitting the network.
          WEATHER_BASE_URL: http://127.0.0.1:9/forecast
        run: pytest --cov=delivery_delay --cov-report=term-missing
